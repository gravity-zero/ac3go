name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "40 4 * * *"

# AC3GO_E2E_REQUIRED is deliberately NOT set anywhere in this file.
#
# It turns every reason the end to end harness would skip into a failure, which
# is what keeps a broken oracle from reading as a green run. But the oracle is a
# reference decoder in a local container plus a corpus of real media that is not
# in this repository and never will be, and a hosted runner has neither. Setting
# it here would not test more, it would fail every job, every time.
#
# So the split is: this file proves the decoder against what the repository can
# carry - unit tests, fixtures, cross builds, fuzzing. The comparison against
# the reference happens on the development machine, and that is where the
# variable belongs:
#
#   AC3GO_E2E_REQUIRED=1 AC3GO_E2E=docker:evey-server AC3GO_E2E_TOOL=ffmpeg \
#   AC3GO_E2E_PROBE=ffprobe AC3GO_E2E_CORPUS=/media \
#   go test ./internal/e2e/ -count=1
#
# Without the first variable that command is green whether or not the container
# answers. With it, a container that has been renamed or rebuilt without ffmpeg
# fails instead of quietly comparing nothing.
#
# If this ever runs on a self-hosted runner that does have the container and the
# corpus, that job - and only that job - should set it.

jobs:
  test:
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Test
        env:
          CGO_ENABLED: "0"
        run: go test ./... -count=1
      - name: Vet
        env:
          CGO_ENABLED: "0"
        run: go vet ./...

  race:
    # The one place the race detector runs: it needs cgo, which the
    # development machine does not have.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Test with the race detector
        run: go test ./... -count=1 -race

  cross:
    # The build targets a release has to hold: wasm is what the player runs,
    # and the 32-bit build is what gives the reader's size guards a platform
    # where they can fire.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Format
        run: test -z "$(gofmt -l .)"
      - name: Build for wasm
        env:
          CGO_ENABLED: "0"
          GOOS: js
          GOARCH: wasm
        run: go build ./...
      - name: Build, vet and test for 386
        # A 64-bit build cannot reach the bit reader's size guard; the 32-bit
        # tests are the ones that actually execute it.
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: "386"
        run: |
          go build ./...
          go vet ./...
          go test ./... -count=1

  fuzz:
    # Nightly only: each target gets a bounded slice, and the corpus grows
    # across nights through the cache, which is how a crasher that needs a
    # mature corpus eventually surfaces.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/go-build/fuzz
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: fuzz-corpus-
      - name: Fuzz each target
        env:
          CGO_ENABLED: "0"
        run: |
          set -e
          for t in FuzzReader; do
            echo "::group::bitstream $t"
            go test -run '^$' -fuzz "^${t}\$" -fuzztime=60s ./bitstream
            echo "::endgroup::"
          done
          for t in FuzzParseSyncInfo FuzzParseHeader FuzzCheckCRC FuzzFrameReader FuzzDecodeFrame; do
            echo "::group::ac3 $t"
            go test -run '^$' -fuzz "^${t}\$" -fuzztime=60s ./ac3
            echo "::endgroup::"
          done
      - name: Keep any crasher
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashers
          path: "**/testdata/fuzz/**"
